<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Error - KarirOScope</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:#0D1117;color:#E6EDF3;display:flex;align-items:center;justify-content:center;min-height:100vh}
  .wrap{text-align:center;padding:40px}
  .code{font-size:80px;font-weight:800;color:#0A66C2;line-height:1}
  .msg{font-size:18px;color:#8B949E;margin:16px 0 32px}
  a{display:inline-block;padding:10px 24px;background:#0A66C2;color:#fff;border-radius:8px;text-decoration:none;font-size:14px;font-weight:600}
  a:hover{background:#0958a8}
</style>
</head>
<body>
<div class="wrap">
  <div class="code">{{ code }}</div>
  <div class="msg">{{ msg }}</div>
  <a href="/">Return to Dashboard</a>
</div>
</body>
</html>
